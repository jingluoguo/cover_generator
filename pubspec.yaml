name: cover_generator
description: >
  一个 Flutter 包，用于生成应用商店封面图（App Store、Play Store 等）。
  支持自定义标题、副标题、渐变色、截图嵌入，采用 Canvas 渲染引擎，输出高质量 PNG 图片。
version: 1.0.0
homepage: https://github.com/jingluoguo/cover_generator
repository: https://github.com/jingluoguo/cover_generator
issue_tracker: https://github.com/jingluoguo/cover_generator/issues

environment:
  sdk: ^3.9.2
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_gallery_saver_plus: ^4.0.1
  image_picker: ^1.0.0
  path_provider: ^2.1.5
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
